spring:
  application:
    name: studioflow-backend
  datasource:
    # TODO: replace with the real local or container PostgreSQL connection.
    url: ${STUDIOFLOW_DB_URL:jdbc:postgresql://localhost:5432/studioflow}
    # TODO: replace with the real database username.
    username: ${STUDIOFLOW_DB_USERNAME:}
    # TODO: provide via environment variable or local override, never commit real values.
    password: ${STUDIOFLOW_DB_PASSWORD:}
    hikari:
      maximum-pool-size: ${STUDIOFLOW_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${STUDIOFLOW_DB_MIN_IDLE:2}
      connection-timeout: ${STUDIOFLOW_DB_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    hibernate:
      # TODO: consider switching to validate once migrations are added.
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  mail:
    host: ${STUDIOFLOW_MAIL_HOST:}
    port: ${STUDIOFLOW_MAIL_PORT:587}
    username: ${STUDIOFLOW_MAIL_USERNAME:}
    password: ${STUDIOFLOW_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${STUDIOFLOW_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${STUDIOFLOW_MAIL_SMTP_STARTTLS_ENABLE:true}

server:
  port: ${STUDIOFLOW_SERVER_PORT:8080}
  forward-headers-strategy: ${STUDIOFLOW_FORWARD_HEADERS_STRATEGY:none}

studioflow:
  cors:
    # Use the frontend origin only here, not a path like /studioflow.
    allowed-origins:
      - ${STUDIOFLOW_CORS_ORIGIN_1:http://localhost:5173}
      - ${STUDIOFLOW_CORS_ORIGIN_2:http://localhost:5174}
      - ${STUDIOFLOW_CORS_ORIGIN_3:http://localhost:5175}
      - ${STUDIOFLOW_CORS_ORIGIN_4:https://ankygautam.github.io}
  security:
    jwt:
      secret: ${STUDIOFLOW_JWT_SECRET:studioflow-jwt-secret-key-change-me-2026}
      expiration-minutes: ${STUDIOFLOW_JWT_EXPIRATION_MINUTES:720}
      public-booking-expiration-minutes: ${STUDIOFLOW_PUBLIC_BOOKING_TOKEN_EXPIRATION_MINUTES:30}
  communication:
    public-base-url: ${STUDIOFLOW_PUBLIC_BASE_URL:}
    email:
      enabled: ${STUDIOFLOW_EMAIL_ENABLED:false}
      from-address: ${STUDIOFLOW_EMAIL_FROM_ADDRESS:noreply@studioflow.co}
      from-name: ${STUDIOFLOW_EMAIL_FROM_NAME:StudioFlow}
    sms:
      enabled: ${STUDIOFLOW_SMS_ENABLED:false}
      provider: ${STUDIOFLOW_SMS_PROVIDER:twilio}
      from-number: ${STUDIOFLOW_SMS_FROM_NUMBER:}
      account-sid: ${STUDIOFLOW_SMS_ACCOUNT_SID:}
      auth-token: ${STUDIOFLOW_SMS_AUTH_TOKEN:}
    reminders:
      enabled: ${STUDIOFLOW_REMINDERS_ENABLED:true}
      cron: ${STUDIOFLOW_REMINDERS_CRON:0 */30 * * * *}

logging:
  level:
    root: ${STUDIOFLOW_LOG_LEVEL_ROOT:INFO}
    com.studioflow: ${STUDIOFLOW_LOG_LEVEL_APP:INFO}
    org.springframework.security: ${STUDIOFLOW_LOG_LEVEL_SECURITY:WARN}
    org.hibernate.SQL: ${STUDIOFLOW_LOG_LEVEL_SQL:WARN}
