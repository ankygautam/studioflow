name: StudioFlow CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          VITE_API_URL: ${{ vars.STUDIOFLOW_FRONTEND_API_URL || 'http://localhost:8080' }}
          VITE_APP_BASE_PATH: ${{ vars.STUDIOFLOW_FRONTEND_BASE_PATH || '/studioflow/' }}
          VITE_APP_ENV: ci

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn test

  package:
    if: github.event_name == 'push'
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: ${{ vars.STUDIOFLOW_FRONTEND_API_URL || 'http://localhost:8080' }}
          VITE_APP_BASE_PATH: ${{ github.ref_name == 'main' && '/studioflow/' || '/' }}
          VITE_APP_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      - run: mvn -DskipTests package
        working-directory: backend
      - uses: actions/upload-artifact@v4
        with:
          name: studioflow-frontend-dist
          path: dist
      - uses: actions/upload-artifact@v4
        with:
          name: studioflow-backend-jar
          path: backend/target/*.jar
